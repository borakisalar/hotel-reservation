<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="detailsPage" class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="hotelNameTitle">Loading...</h2>
        <div>
            <a href="searchResults.html" class="btn btn-outline-secondary me-2">Back</a>
            <button id="bookNowBtn" class="btn btn-primary">Book now</button>
        </div>
    </div>
    
    <div class="mb-4">
        <img id="hotelMainImg" src="" class="img-fluid rounded w-100" style="max-height: 400px; object-fit: cover;">
    </div>

    <div class="row mb-5">
        <div class="col-md-8">
            <h4>About the property</h4>
            <p id="hotelDescText"></p>
        </div>
        <div class="col-md-4 border-start">
            <h4>Details</h4>
            <p id="hotelAddressText"></p>
            <p id="hotelPriceText" class="fw-bold text-success"></p>
        </div>
    </div>

    <div id="roomSection" class="hidden">
        <h3 class="mb-4">Select a Room</h3>
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>Room Type</th>
                    <th>Price per night</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="roomTableBody">
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
