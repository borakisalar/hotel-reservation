<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">CSC391 Project</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="searchResults.html">Search</a>
            </div>
        </div>
    </nav>

    <div class="container mb-5" id="hotelDetailsContainer">
        
        <div id="hotelCarousel" class="carousel slide mb-4" data-bs-ride="carousel">
            <div class="carousel-inner" id="hotelCarouselInner"></div>
            <button class="carousel-control-prev" type="button" data-bs-target="#hotelCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon bg-dark rounded" aria-hidden="true"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#hotelCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon bg-dark rounded" aria-hidden="true"></span>
            </button>
        </div>

        <div class="row">
            <div class="col-md-8">
                <h2 id="hotelNameTitle"></h2>
                <p id="hotelAddress" class="text-muted"></p>
                <div class="mb-3">
                    <span class="badge bg-primary" id="hotelStar"></span>
                    <span class="badge bg-secondary" id="hotelRating"></span>
                </div>
                <p id="hotelDescription"></p>

                <h4>Hotel Rules</h4>
                <ul id="hotelRulesList"></ul>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h4 class="card-title text-success" id="hotelPrice"></h4>
                        <button class="btn btn-primary btn-lg mt-3 w-100" id="bookNowBtn">Book Now</button>
                    </div>
                </div>
            </div>
        </div>

        
        <div id="roomSelectionSection">
            <h4>Select a Room</h4>
            <div class="row g-3" id="roomOptionsContainer"></div>
            <div class="mt-4 text-end">
                <div class="error-msg" id="roomError">Please select a room type.</div>
                <button class="btn btn-success btn-lg" id="proceedPaymentBtn">Book Now</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
