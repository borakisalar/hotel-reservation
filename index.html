<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">CSC391 Project</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="searchResults.html">Search</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Search Bar Section -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Search Hotels</h5>
                <form id="searchForm" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Destination / Hotel Name</label>
                        <input type="text" class="form-control" id="searchQuery" required>
                        <div class="error-msg" id="queryError">Please enter a search text.</div>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Check-in</label>
                        <input type="date" class="form-control" id="checkIn" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Check-out</label>
                        <input type="date" class="form-control" id="checkOut" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Guests</label>
                        <input type="number" class="form-control" id="guestCount" min="1" value="2" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Rooms</label>
                        <input type="number" class="form-control" id="roomCount" min="1" value="1" required>
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Search</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Deals Section -->
        <div id="dealsSection" class="mb-5">
            <h3 class="mb-3">Deals & Discounts</h3>
            <div class="row" id="dealsContainer"></div>
        </div>

        <!-- Search Results (Only shown after search) -->
        <div id="indexSearchResultsSection" class="mb-5" style="display:none;">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Search Results</h3>
                <a href="searchResults.html" class="btn btn-link">See more deals</a>
            </div>
            <!-- Carousel for search results -->
            <div id="searchResultsCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner" id="searchResultsCarouselInner"></div>
                <button class="carousel-control-prev" type="button" data-bs-target="#searchResultsCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon bg-dark rounded" aria-hidden="true"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#searchResultsCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon bg-dark rounded" aria-hidden="true"></span>
                </button>
            </div>
        </div>

        <!-- Popular Searches Section -->
        <div id="popularSection" class="mb-5">
            <h3 class="mb-3">Popular Searches</h3>
            <div id="popularCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner" id="popularCarouselInner"></div>
                <button class="carousel-control-prev" type="button" data-bs-target="#popularCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon bg-dark rounded" aria-hidden="true"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#popularCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon bg-dark rounded" aria-hidden="true"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Script references -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
