<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Reservation - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="homePage" class="container py-4">
    <section class="card shadow-sm p-4 mb-5">
        <div class="row g-3">
            <div class="col-md-4">
                <input type="text" id="searchInput" class="form-control" placeholder="Hotel Name or City" required>
            </div>
            <div class="col-md-3">
                <input type="date" class="form-control" required>
            </div>
            <div class="col-md-3">
                <input type="text" class="form-control" placeholder="2 Guests, 1 Room" required>
            </div>
            <div class="col-md-2">
                <button id="searchBtn" class="btn btn-primary w-100 py-2">Search</button>
            </div>
        </div>
    </section>

    <section class="mb-5">
        <h3 class="mb-4">Deals and Discounts</h3>
        <div id="dealsContainer" class="row row-cols-1 row-cols-md-4 g-4"></div>
    </section>

    <section class="mb-5">
        <h3 class="mb-4">Popular Searches</h3>
        <div id="popCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner" id="popularContainer"></div>
            <button class="carousel-control-prev" type="button" data-bs-target="#popCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#popCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
