<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">CSC391 Project</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="searchResults.html">Search</a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <h2 class="mb-4">Complete Your Booking</h2>
        <div class="row">
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-body">
                        <h4 class="card-title">Guest Information</h4>
                        <form id="paymentForm" class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" id="firstName" placeholder="First Name"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="lastName" placeholder="Last Name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="Email" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <div class="input-group">
                                    <select class="form-select" style="max-width: 120px;" aria-label="Country Code">
                                        <option value="+90">🇹🇷 +90</option>
                                    </select>
                                    <input type="tel" class="form-control" id="phone" placeholder="555 555 55 55" required>
                                </div>
                            </div>

                            <h4 class="mt-4">Payment Information</h4>
                            <div class="col-12 mt-2">
                                <label class="form-label">Card Number</label>
                                <input type="text" class="form-control" id="cardNumber"
                                    placeholder="1234-5678-9012-3456" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Card Holder</label>
                                <input type="text" class="form-control" id="cardHolder" placeholder="John Doe" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Expiry (MM/YY)</label>
                                <input type="text" class="form-control" id="expiry" placeholder="05/28" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">CVV</label>
                                <input type="text" class="form-control" id="cvv" placeholder="123" required>
                            </div>

                            <div class="col-12 mt-4 text-end">
                                <button type="submit" class="btn btn-success btn-lg">Complete the Booking</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body bg-light">
                        <h4 class="card-title">Booking Summary</h4>
                        <hr>
                        <p><strong>Hotel:</strong> <span id="summaryName"></span></p>
                        <p><strong>Address:</strong> <span id="summaryAddress"></span></p>
                        <p><strong>Room Type:</strong> <span id="summaryRoomType"></span></p>
                        <p><strong>Dates:</strong> <span id="summaryDates"></span></p>
                        <p><strong>Guests:</strong> <span id="summaryGuests"></span></p>
                        <p><strong>Rooms:</strong> <span id="summaryRooms"></span></p>
                        <hr>
                        <h5 class="text-success text-end">Total: <span id="summaryTotal"></span></h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
