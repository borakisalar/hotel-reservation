<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="paymentPage" class="container py-4">
    <h2 class="mb-4">Complete Your Booking</h2>
    
    <div class="row">
        <div class="col-md-8">
            <form id="paymentForm" class="card p-4">
                <h4 class="mb-3">Guest Details</h4>
                <div class="mb-3"><input type="text" id="guestName" class="form-control" placeholder="Full Name" required></div>
                <div class="mb-3"><input type="email" id="guestEmail" class="form-control" placeholder="Email Address" required></div>
                
                <h4 class="mb-3 mt-4">Payment Information</h4>
                <div class="mb-3"><input type="text" id="cardNumber" class="form-control" placeholder="Card Number (16 digits)" required minlength="16" maxlength="16"></div>
                <div class="row">
                    <div class="col"><input type="text" class="form-control" placeholder="MM/YY" required></div>
                    <div class="col"><input type="text" class="form-control" placeholder="CVC" required></div>
                </div>
                
                <button type="submit" class="btn btn-success w-100 mt-4">Confirm Reservation</button>
            </form>
        </div>
        
        <div class="col-md-4">
            <div class="card p-4 bg-light">
                <h4>Booking Summary</h4>
                <hr>
                <h5 id="summaryHotel"></h5>
                <p id="summaryRoom" class="text-muted"></p>
                <h4 id="summaryTotal" class="text-success mt-3"></h4>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
